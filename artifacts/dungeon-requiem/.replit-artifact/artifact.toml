kind = "web"
previewPath = "/"
title = "Dungeon Requiem"
version = "1.0.0"
id = "artifacts/dungeon-requiem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22112

[services.development]
run = "pnpm --filter @workspace/dungeon-requiem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dungeon-requiem", "run", "build" ]
publicDir = "artifacts/dungeon-requiem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22112"
BASE_PATH = "/"
