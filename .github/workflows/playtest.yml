# Build the dungeon-requiem artifact and deploy it to GitHub Pages so the
# game can be playtested directly from a live URL — no Replit pull needed.
#
# DEPLOY RACE AVOIDANCE
# ---------------------
# GitHub Pages serves a single site — whichever branch pushes most recently
# becomes the live build. To prevent feature branches from clobbering each
# other's deploys, only ONE canonical branch is allowed to publish here:
# claude/labyrinth-portals-shroud-HzrBb (the branch carrying both the
# Labyrinth game mode and all gear-overhaul commits, merged together).
#
# If you want to add another branch to the live deploy list, first make sure
# it contains every game mode (classic + labyrinth) so it won't regress the
# live URL when it wins the deploy race.
#
# After the first successful run, visit the repo Settings → Pages and set
# "Source" to "GitHub Actions". From then on every push to the branch below
# will rebuild and redeploy the site automatically.
#
# Published URL: https://cyberheart777.github.io/Dark-Fantasy-Slash/

name: Playtest Deploy

on:
  push:
    branches:
      - claude/labyrinth-portals-shroud-HzrBb
  workflow_dispatch:

# Minimum permissions needed for GitHub Pages deployment via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Opt all JavaScript-based actions into the Node 24 runtime now rather than
# waiting for the June 2026 forced migration. Silences the "Node.js 20
# actions are deprecated" warning on every run.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Only one deploy at a time. cancel-in-progress is intentionally false so a
# running deploy finishes rather than being aborted by a newer push.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dungeon-requiem
        env:
          # vite.config.ts requires both of these. BASE_PATH must match the
          # GitHub Pages subdirectory, which for a repo named "Dark-Fantasy-Slash"
          # served from cyberheart777.github.io is `/Dark-Fantasy-Slash/`.
          PORT: "5173"
          BASE_PATH: /Dark-Fantasy-Slash/
        run: pnpm --filter @workspace/dungeon-requiem build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dungeon-requiem/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
